<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VOX — Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill,minmax(340px,1fr)); }
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); font-weight: 700; margin-bottom: 1rem; }
    .user-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 0;
      border-bottom: 1px solid rgba(42,42,62,0.5); }
    .user-row:last-child { border-bottom: none; }
    .user-info { flex: 1; }
    .user-name { font-weight: 600; font-size: 0.9rem; }
    .user-bal { font-family: 'DM Mono', monospace; color: var(--gold); font-size: 0.85rem; }
    .pending-card { background: rgba(255,209,102,0.05); border: 1px solid rgba(255,209,102,0.2); }
    .stats-mini { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-mini { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem; text-align: center; }
    .stat-mini-val { font-family: 'DM Mono', monospace; font-size: 1.3rem; color: var(--text); }
    .stat-mini-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .mint-row { display: flex; gap: 0.5rem; align-items: flex-end; }
  </style>
</head>
<body>
<main>
  <h1 class="page-title">⚙ Admin Panel</h1>
  <p class="page-sub">Approve users, mint/burn Vox, manage the economy.</p>

  <div class="stats-mini" id="eco-stats"></div>

  <div class="admin-grid">

    <!-- PENDING -->
    <div class="card pending-card">
      <div class="section-title">⏳ Pending Approvals</div>
      <div id="pending-list"><div class="text-muted text-sm">No pending users.</div></div>
    </div>

    <!-- MINT / BURN -->
    <div class="card">
      <div class="section-title">🪙 Mint / Burn VOX</div>
      <div class="form-group">
        <label>User</label>
        <select id="mint-user"></select>
      </div>
      <div class="form-group">
        <label>Amount</label>
        <div class="mint-row">
          <input type="number" id="mint-amount" placeholder="e.g. 500" min="1" style="flex:1">
          <button class="btn btn-success" onclick="doMint()">+ Mint</button>
          <button class="btn btn-danger" onclick="doBurn()">− Burn</button>
        </div>
      </div>
      <div class="form-group">
        <label>Reason (optional)</label>
        <input type="text" id="mint-note" placeholder="e.g. Event reward" maxlength="80">
      </div>
      <div id="mint-msg"></div>
    </div>

    <!-- ALL USERS -->
    <div class="card">
      <div class="section-title">👥 All Users</div>
      <div id="users-list"></div>
    </div>

    <!-- SHOP MANAGEMENT -->
    <div class="card">
      <div class="section-title">🛍 Shop Listings</div>
      <div id="shop-list"></div>
    </div>

    <!-- RECENT TXS -->
    <div class="card" style="grid-column: 1 / -1">
      <div class="section-title">📜 Recent Transactions</div>
      <div style="overflow-x:auto">
        <table id="tx-table">
          <thead><tr><th>From</th><th>To</th><th>Amount</th><th>Note</th><th>Time</th></tr></thead>
          <tbody id="tx-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script src="../js/core.js"></script>
<script src="../js/nav.js"></script>
<script>
  const me = VOX.requireAdmin("../index.html");
  buildNav("admin.html");

  function relTime(ts) {
    const d = Date.now() - ts, m = 60000, h = 3600000, day = 86400000;
    if (d < m) return "just now";
    if (d < h) return Math.floor(d/m) + "m ago";
    if (d < day) return Math.floor(d/h) + "h ago";
    return Math.floor(d/day) + "d ago";
  }

  function setMsg(id, msg, type) {
    document.getElementById(id).innerHTML = msg ? `<div class="alert alert-${type} mb-1">${msg}</div>` : "";
    if (msg) setTimeout(() => document.getElementById(id).innerHTML = "", 3000);
  }

  function renderAll() {
    renderStats(); renderPending(); renderUsers(); renderShop(); renderTxs();
  }

  function renderStats() {
    const db = VOX.load();
    const users = Object.values(db.users).filter(u => !u.isAdmin);
    const totalVox = users.reduce((s,u) => s + u.balance, 0);
    const active = VOX.shopListings().filter(i => !i.sold).length;
    document.getElementById("eco-stats").innerHTML = `
      <div class="stat-mini"><div class="stat-mini-val">${users.length}</div><div class="stat-mini-label">Users</div></div>
      <div class="stat-mini"><div class="stat-mini-val">${VOX.fmt(totalVox)}</div><div class="stat-mini-label">VOX Circulating</div></div>
      <div class="stat-mini"><div class="stat-mini-val">${active}</div><div class="stat-mini-label">Active Listings</div></div>
    `;
  }

  function renderPending() {
    const pending = VOX.pendingUsers();
    const el = document.getElementById("pending-list");
    if (!pending.length) { el.innerHTML = `<div class="text-muted text-sm">No pending users. ✓</div>`; return; }
    el.innerHTML = pending.map(u => `
      <div class="user-row">
        <span style="font-size:1.3rem">${u.avatar}</span>
        <div class="user-info">
          <div class="user-name">${u.username}</div>
          <div class="text-sm text-muted">Requested ${relTime(u.joinedAt)}</div>
        </div>
        <button class="btn btn-success btn-sm" onclick="approve('${u.username}')">Approve</button>
        <button class="btn btn-danger btn-sm" onclick="reject('${u.username}')">Reject</button>
      </div>
    `).join("");
  }

  function approve(username) {
    VOX.approveUser(username);
    renderAll();
    setMsg("mint-msg", `${username} approved and given 100 VOX!`, "success");
  }
  function reject(username) {
    if (!confirm(`Reject ${username}?`)) return;
    VOX.rejectUser(username);
    renderPending();
  }

  function renderUsers() {
    const users = VOX.allUsers().filter(u => !u.isAdmin);
    const sel = document.getElementById("mint-user");
    sel.innerHTML = users.map(u => `<option value="${u.id}">${u.avatar} ${u.username}</option>`).join("");

    const el = document.getElementById("users-list");
    if (!users.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">👥</div>No users yet.</div>`; return; }
    el.innerHTML = users.sort((a,b) => b.balance - a.balance).map(u => `
      <div class="user-row">
        <span style="font-size:1.3rem">${u.avatar}</span>
        <div class="user-info">
          <div class="user-name">${u.username}</div>
          <div class="user-bal">⬡ ${VOX.fmt(u.balance)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="quickMint('${u.id}')">+ Mint</button>
      </div>
    `).join("");
  }

  function quickMint(userId) {
    const amt = parseInt(prompt(`How many VOX to give ${userId}?`));
    if (!amt || amt < 1) return;
    const note = prompt("Reason (optional):") || "Admin mint";
    VOX.mint(userId, amt, note);
    renderAll();
    refreshNavBalance();
  }

  function doMint() {
    const userId = document.getElementById("mint-user").value;
    const amt = parseInt(document.getElementById("mint-amount").value);
    const note = document.getElementById("mint-note").value || "Admin mint";
    if (!amt || amt < 1) return setMsg("mint-msg", "Enter a valid amount.", "error");
    VOX.mint(userId, amt, note);
    setMsg("mint-msg", `Minted ${VOX.fmt(amt)} VOX to ${userId}.`, "success");
    renderAll(); refreshNavBalance();
  }

  function doBurn() {
    const userId = document.getElementById("mint-user").value;
    const amt = parseInt(document.getElementById("mint-amount").value);
    const note = document.getElementById("mint-note").value || "Admin burn";
    if (!amt || amt < 1) return setMsg("mint-msg", "Enter a valid amount.", "error");
    if (!confirm(`Burn ${VOX.fmt(amt)} VOX from ${userId}?`)) return;
    VOX.burn(userId, amt, note);
    setMsg("mint-msg", `Burned ${VOX.fmt(amt)} VOX from ${userId}.`, "success");
    renderAll(); refreshNavBalance();
  }

  function renderShop() {
    const listings = VOX.shopListings();
    const el = document.getElementById("shop-list");
    if (!listings.length) { el.innerHTML = `<div class="text-muted text-sm">No listings.</div>`; return; }
    el.innerHTML = listings.slice(0,15).map(item => `
      <div class="user-row">
        <div class="user-info">
          <div class="user-name" style="font-size:0.85rem">${item.title}</div>
          <div class="text-sm text-muted">by ${item.sellerId} · ⬡${VOX.fmt(item.price)} ${item.sold?'<span class="badge badge-red">SOLD</span>':''}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="adminDeleteItem(${item.id})">Del</button>
      </div>
    `).join("");
  }

  function adminDeleteItem(id) {
    if (!confirm("Delete this listing?")) return;
    VOX.deleteItem(id, me.id);
    renderShop();
  }

  function renderTxs() {
    const db = VOX.load();
    const txs = db.transactions.slice(0, 30);
    const tbody = document.getElementById("tx-body");
    if (!txs.length) { tbody.innerHTML = `<tr><td colspan="5" class="text-muted text-sm">No transactions yet.</td></tr>`; return; }
    tbody.innerHTML = txs.map(t => `
      <tr>
        <td>${t.from}</td><td>${t.to}</td>
        <td class="vox-amount">⬡ ${VOX.fmt(t.amount)}</td>
        <td class="text-muted text-sm">${t.note || '—'}</td>
        <td class="text-muted text-sm mono">${relTime(t.ts)}</td>
      </tr>
    `).join("");
  }

  renderAll();
</script>
</body>
</html>
